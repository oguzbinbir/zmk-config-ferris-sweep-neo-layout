# ─────────────────────────────────────────
# Bluetooth
# ─────────────────────────────────────────
CONFIG_ZMK_KEYBOARD_NAME="Tastatur Mark II"

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_TX_PWR_MINUS_8=y

# Batterie
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=3600

# Sleep nach 15 Minuten
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# USB deaktivieren
CONFIG_ZMK_USB=n
