manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: zmk-contrib
      url-base: https://github.com/zmk-contrib
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-contrib
      remote: zmk-contrib
      revision: main
  self:
    path: config