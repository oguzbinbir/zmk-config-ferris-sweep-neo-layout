# ─────────────────────────────────────────
# Bluetooth
# ─────────────────────────────────────────
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_PAIRING=y

# Bis zu 5 BT-Profile speichern
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Bluetooth-Sendeleistung reduzieren (spart Strom, reicht für normale Abstände)
CONFIG_BT_CTLR_TX_PWR_MINUS_8=y

# ─────────────────────────────────────────
# Batterie
# ─────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y

# Batteriestatus nur alle 60 Minuten melden (statt häufiger)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=3600

# ─────────────────────────────────────────
# Sleep / Idle
# ─────────────────────────────────────────
# Deep Sleep nach 15 Minuten Inaktivität (in Millisekunden)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Idle-Modus nach 30 Sekunden (reduziert BT-Polling, spart Strom)
CONFIG_ZMK_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=30000

# ─────────────────────────────────────────
# USB
# ─────────────────────────────────────────
# USB deaktivieren wenn nicht gebraucht (spart merklich Strom)
# Auf y setzen wenn du USB-Debugging brauchst
CONFIG_ZMK_USB=n

# ─────────────────────────────────────────
# Logging deaktivieren (spart Strom + Flash)
# ─────────────────────────────────────────
CONFIG_ZMK_LOG_LEVEL_ERR=y
