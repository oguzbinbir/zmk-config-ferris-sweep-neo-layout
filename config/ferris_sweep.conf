# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_PAIRING=y

# Bis zu 5 BT-Profile speichern
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Batterie-Reporting (nice!nano hat eingebautes)
CONFIG_ZMK_BATTERY_REPORTING=y

# Sleep nach Inaktivität (Akku schonen)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# USB (für Debugging optional)
CONFIG_ZMK_USB=y